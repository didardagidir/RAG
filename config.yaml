# All tunable knobs in one place. Loaded by src/config.py.

data:
  dataset: natural_questions      # natural_questions | hotpot_qa
  sample_size: 5000               # null = use full set
  chunk_size: 512                 # tokens per chunk
  chunk_overlap: 64

retrieval:
  top_k: 20                       # candidates pulled before reranking
  final_k: 5                      # passages handed to the generator
  use_hybrid: true                # BM25 + dense fusion
  use_reranker: true
  reranker_model: cross-encoder/ms-marco-MiniLM-L-6-v2
  rrf_k: 60                       # reciprocal rank fusion constant

agent:
  enable_multihop: true
  max_iterations: 1               # narrow corpus: extra loops just burn quota; raise for fullwiki
  max_subquestions: 4

generation:
  temperature: 0.0
  max_tokens: 512

evaluation:
  metrics: [recall@10, mrr@10, ndcg@10, faithfulness, answer_relevance]
  n_samples: 200
